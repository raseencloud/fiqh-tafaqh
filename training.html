<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التدريب الفقهي</title>
<style>
body{
    background:#d1fae5;
    font-family:Tahoma, Arial, sans-serif;
    text-align:center;
    padding:20px;
    margin:0;
}

.main-card{
    max-width:780px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    border-top:6px solid #16a34a;
}

h1{color:#065f46;}

input,select,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:15px;
    font-family:inherit;
    box-sizing:border-box;
}

button{
    background:#16a34a;
    color:#fff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{background:#15803d;}

button:disabled{
    background:#9ca3af;
    cursor:not-allowed;
}

.question{
    font-size:22px;
    font-weight:700;
    color:#111827;
    margin:20px 0;
    line-height:1.8;
}

.answer{
    background:#f3f4f6;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    border:1px solid #d1d5db;
    font-weight:700;
    color:#000;
    transition:background .2s;
}

.answer:hover{background:#dcfce7;}

.meta{
    font-size:13px;
    color:#166534;
    font-weight:700;
    margin-bottom:8px;
}

.error-msg{
    color:#dc2626;
    font-weight:bold;
    padding:20px;
}

.success-msg{
    color:#16a34a;
    font-weight:bold;
    padding:20px;
}

.result-box{
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    margin-top:20px;
}

.wrong-item{
    border:1px solid #ddd;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    text-align:right;
}

.wrong-ans{color:#b91c1c;}
.correct-ans{color:#15803d;}

@media print {
    body * { visibility: hidden !important; }
    #certificate,
    #certificate * { visibility: visible !important; }
    #certificate {
        position: absolute !important;
        top: 0;
        left: 0;
        width: 100%;
    }
    #quiz { display: none !important; }
}
</style>
<base target="_blank">
<base target="_blank">
</head>

<body>

<div style="display:flex;justify-content:space-between;align-items:center;max-width:780px;margin:0 auto 20px;">
  <a href="home.html" style="background:#16a34a;color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">🏠 العودة للرئيسية</a>
  <h1 style="margin:0">منصة التدريب الفقهي</h1>
  <span></span>
</div>

<div class="main-card">

<input id="candidateName" placeholder="اسم المتدرب">

<select id="categoryFilter">
    <option value="all">كل التصنيفات</option>
    <option value="فقه">فقه</option>
    <option value="عقيدة">عقيدة</option>
    <option value="توحيد">توحيد</option>
    <option value="تفسير">تفسير</option>
    <option value="حديث">حديث</option>
    <option value="أصول فقه">أصول فقه</option>
    <option value="لغة عربية">لغة عربية</option>
    <option value="سيرة">سيرة</option>
    <option value="منوعات إسلامية">منوعات إسلامية</option>
    <option value="ثقافة إسلامية">ثقافة إسلامية</option>
    <option value="عام">عام</option>
</select>

<select id="levelFilter">
    <option value="all">كل المستويات</option>
    <option value="سهل">سهل</option>
    <option value="متوسط">متوسط</option>
    <option value="صعب">صعب</option>
</select>

<select id="sourceFilter">
    <option value="all">كل المصادر</option>
</select>

<select id="questionCount">
    <option value="3" selected>3</option>
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="20">20</option>
    <option value="30">30</option>
    <option value="50">50</option>
    <option value="80">80</option>
    <option value="100">100</option>
</select>

</div>
