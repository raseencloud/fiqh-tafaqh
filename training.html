<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التدريب الفقهي</title>
<style>
body{
    background:#d1fae5;
    font-family:Tahoma, Arial, sans-serif;
    text-align:center;
    padding:20px;
    margin:0;
}

.main-card{
    max-width:780px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    border-top:6px solid #16a34a;
}

h1{color:#065f46;}

input,select,button{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:15px;
    font-family:inherit;
    box-sizing:border-box;
}

button{
    background:#16a34a;
    color:#fff;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

button:hover{background:#15803d;}

button:disabled{
    background:#9ca3af;
    cursor:not-allowed;
}

/* ====== تنسيق مميز لحقل المصدر ====== */
.source-box {
    background: #ecfdf5;
    border: 2px solid #16a34a;
    border-radius: 12px;
    padding: 15px;
    margin: 12px 0;
}
.source-box label {
    display: block;
    color: #065f46;
    font-weight: bold;
    font-size: 16px;
    margin-bottom: 6px;
}
.source-box select {
    margin: 0;
    border: 2px solid #16a34a;
    background: #fff;
    font-weight: bold;
    color: #065f46;
}
/* =================================== */

.question{
    font-size:22px;
    font-weight:700;
    color:#111827;
    margin:20px 0;
    line-height:1.8;
}

.answer{
    background:#f3f4f6;
    padding:14px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
    border:1px solid #d1d5db;
    font-weight:700;
    color:#000;
    transition:background .2s;
}

.answer:hover{background:#dcfce7;}

.meta{
    font-size:13px;
    color:#166534;
    font-weight:700;
    margin-bottom:8px;
}

.error-msg{
    color:#dc2626;
    font-weight:bold;
    padding:20px;
}

.success-msg{
    color:#16a34a;
    font-weight:bold;
    padding:20px;
}

.result-box{
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    margin-top:20px;
}

.wrong-item{
    border:1px solid #ddd;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    text-align:right;
}

.wrong-ans{color:#b91c1c;}
.correct-ans{color:#15803d;}

@media print {
    body * { visibility: hidden !important; }
    #certificate,
    #certificate * { visibility: visible !important; }
    #certificate {
        position: absolute !important;
        top: 0;
        left: 0;
        width: 100%;
    }
    #quiz { display: none !important; }
}
</style>

</head>

<body>

<div style="display:flex;justify-content:space-between;align-items:center;max-width:780px;margin:0 auto 20px;">
  <a href="index.html" style="background:#16a34a;color:#fff;padding:8px 16px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">🏠 العودة للرئيسية</a>
  <h1 style="margin:0">منصة التدريب الفقهي</h1>
  <span></span>
</div>

<div class="main-card">

<input id="candidateName" placeholder="اسم المتدرب">

<select id="categoryFilter">
    <option value="all">كل التصنيفات</option>
    <option value="فقه">فقه</option>
    <option value="عقيدة">عقيدة</option>
    <option value="توحيد">توحيد</option>
    <option value="تفسير">تفسير</option>
    <option value="حديث">حديث</option>
    <option value="أصول فقه">أصول فقه</option>
    <option value="لغة عربية">لغة عربية</option>
    <option value="سيرة">سيرة</option>
    <option value="منوعات إسلامية">منوعات إسلامية</option>
    <option value="ثقافة إسلامية">ثقافة إسلامية</option>
    <option value="عام">عام</option>
</select>

<select id="levelFilter">
    <option value="all">كل المستويات</option>
    <option value="سهل">سهل</option>
    <option value="متوسط">متوسط</option>
    <option value="صعب">صعب</option>
</select>

<!-- ====== حقل المصدر المميز ====== -->
<div class="source-box">
    <label for="sourceSearch">📚 ابحث عن المصدر (الكتاب / المنهج)</label>

    <input id="sourceSearch" list="sourceList" placeholder="🔍 اكتب أو اختر المصدر">

    <datalist id="sourceList"></datalist>

    <small style="color:#166534;">
        يتم تحديث القائمة تلقائياً حسب المصادر المتاحة في قاعدة البيانات
    </small>
</div>
<!-- ================================ -->

<select id="questionCount">
    <option value="3" selected>3</option>
    <option value="5">5</option>
    <option value="10">10</option>
    <option value="20">20</option>
    <option value="30">30</option>
    <option value="50">50</option>
    <option value="80">80</option>
    <option value="100">100</option>
</select>

</div>

<button onclick="startExam()" id="startBtn">ابدأ الاختبار</button>

<div id="quiz"></div>

<div id="certificate" style="display:none; margin-top:20px; padding:25px; border:8px double #166534; border-radius:18px; background:linear-gradient(135deg,#ecfdf5,#ffffff);">

    <h2 style="color:#166534;">شهادة إتمام الاختبار</h2>

    <p>اسم المتدرب: <span id="certName"></span></p>
    <p>النتيجة: <span id="score"></span> / <span id="total"></span></p>
    <p>نسبة النجاح: <span id="percent"></span>%</p>

    <p>رقم الشهادة: <span id="id"></span></p>

    <div id="qr"></div>

    <p>ختم واعتماد المدير التنفيذي للمنصة</p>
</div>

<script>
"use strict";

/* =========================
   STATE
========================= */
let allQuestions = [];
let questions = [];
let current = 0;
let score = 0;
let candidateName = "";
let selectedCount = 5;
let answered = false;
let userAnswers = [];

const MIN_CERT_QUESTIONS = 20;
const JSON_URL = "https://raw.githubusercontent.com/ieashehata1965-netizen/fiqh-tafaqh/main/fiqh-questions.json";

/* =========================
   LOAD NAME FROM HOME PAGE
========================= */
(function(){
    const savedName = localStorage.getItem('trainee_name');
    if(savedName){
        document.getElementById("candidateName").value = savedName;
    }
})();

/* =========================
   LOAD QUESTIONS
========================= */
async function loadQuestions() {
    try {
        const res = await fetch(JSON_URL, { cache: "no-store" });

        if (!res.ok) throw new Error("HTTP Error: " + res.status);

        const raw = await res.json();

        if (!Array.isArray(raw)) throw new Error("Data not array");

       allQuestions = raw.map(normalize).filter(Boolean);

alert("عدد الأسئلة: " + allQuestions.length);
alert("أول مصدر: " + allQuestions[0].source);

const sources = [...new Set(allQuestions.map(q => q.source).filter(Boolean))].sort();
alert(sources.join("\n"));
        
const sourceList = document.getElementById("sourceList");
sourceList.innerHTML = "";

sources.forEach(src => {
    const opt = document.createElement("option");
    opt.value = src;
    sourceList.appendChild(opt);
});
        return true;

        
    } catch (e) {
        console.error(e);
        document.getElementById("quiz").innerHTML = '<div class="error-msg">❌ فشل تحميل الأسئلة. تأكد من اتصالك بالإنترنت.</div>';
        document.getElementById("startBtn").disabled = false;
        document.getElementById("startBtn").textContent = "ابدأ الاختبار";
        return false;
    }
}

/* =========================
   NORMALIZE
========================= */
function normalize(item){
    if(!item) return null;

    const q = String(item.q ?? "").trim();
    const a = Array.isArray(item.a) ? item.a : [];
    const c = Number(item.c);

    if(!q || a.length < 2) return null;

    return {
        id: item.id,
        category: item.category || "غير مصنف",
        level: item.level || "غير محدد",
        source: item.source || "غير محدد",
        q,
        a,
        c: (c >= 0 && c < a.length) ? c : 0
    };
}

/* =========================
   SHUFFLE
========================= */
function shuffle(arr){
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

/* =========================
   START EXAM
========================= */
window.startExam = async function () {

    candidateName = document.getElementById("candidateName").value.trim();

    if(!candidateName){
        alert("⚠️ أدخل اسمك");
        document.getElementById("candidateName").focus();
        return;
    }

    selectedCount = parseInt(document.getElementById("questionCount").value, 10) || 5;

    const btn = document.getElementById("startBtn");
    btn.disabled = true;
    btn.textContent = "جاري التحميل...";

    document.getElementById("quiz").innerHTML = '<div class="success-msg">⏳ جاري تحميل الأسئلة...</div>';

    const ok = await loadQuestions();
    if(!ok) return;

    const cat = document.getElementById("categoryFilter").value;
const lvl = document.getElementById("levelFilter").value;
const src = document.getElementById("sourceSearch").value.trim();

let pool = allQuestions.filter(q =>
    (cat === "all" || q.category === cat) &&
    (lvl === "all" || q.level === lvl) &&
    (src === "" || q.source === src)
);

    if(pool.length === 0){
        document.getElementById("quiz").innerHTML = '<div class="error-msg">❌ لا توجد أسئلة تطابق الفلاتر المحددة.</div>';
        btn.disabled = false;
        btn.textContent = "ابدأ الاختبار";
        return;
    }

    // Adjust selectedCount if pool is smaller
    selectedCount = Math.min(selectedCount, pool.length);

    questions = shuffle(pool).slice(0, selectedCount);

    current = 0;
    score = 0;
    userAnswers = new Array(selectedCount).fill(null);

    btn.style.display = "none";
    document.querySelector('.main-card').style.display = 'none';

    showQuestion();
};
/* =========================
   SHOW QUESTION
========================= */
function showQuestion(){

    answered = false;

    if(current >= questions.length){
        showResult();
        return;
    }

    const q = questions[current];

    let html = "<div class='main-card'>";
    html += "<div class='meta'>سؤال " + (current + 1) + " من " + questions.length + "</div>";
    html += "<div class='question'>" + esc(q.q) + "</div>";

    q.a.forEach((ans, i) => {
        html += "<div class='answer' onclick='answer(" + i + ")' id='ans" + i + "'>" + esc(ans) + "</div>";
    });

    html += "</div>";

    document.getElementById("quiz").innerHTML = html;
}
/* =========================
   ANSWER
========================= */
function answer(i){

    if(answered) return;
    answered = true;

    const q = questions[current];
    userAnswers[current] = i;

    const boxes = document.querySelectorAll(".answer");

    if(i === q.c){
        score++;
        if(boxes[i]) boxes[i].style.background = "#dcfce7";
    } else {
        if(boxes[i]) boxes[i].style.background = "#fee2e2";
        if(boxes[q.c]) boxes[q.c].style.background = "#dcfce7";
    }

    setTimeout(() => {
        current++;
        showQuestion();
    }, 800);
}
/* =========================
   RESULT
========================= */
function showResult(){

    const total = questions.length;
    const percent = total ? Math.round((score / total) * 100) : 0;

    const level =
        percent >= 90 ? "ممتاز 🌟" :
        percent >= 75 ? "جيد جداً 👍" :
        percent >= 60 ? "جيد ✅" :
        "يحتاج تطوير 📚";

    const showCertificate =
        selectedCount >= MIN_CERT_QUESTIONS && percent >= 60;

    // Build wrong answers HTML
    let wrongAnswersHTML = "";

    questions.forEach((q, index) => {
        const userAnswer = userAnswers[index];
        const correct = q.c;
        const options = q.a;

        if(userAnswer !== correct){
            wrongAnswersHTML += `
                <div class="wrong-item">
                    <p><b>السؤال:</b> ${esc(q.q)}</p>
                    <p class="wrong-ans">
                        ❌ إجابتك: ${esc(options[userAnswer] ?? "لم تتم الإجابة")}
                    </p>
                    <p class="correct-ans">
                        ✅ الإجابة الصحيحة: ${esc(options[correct] ?? "غير متوفرة")}
                    </p>
                </div>
            `;
        }
    });

    // Update exam count
    let totalExams = parseInt(localStorage.getItem('total_exams') || '0', 10);
    localStorage.setItem('total_exams', totalExams + 1);

    // Update cert count if applicable
    if(showCertificate){
        let totalCerts = parseInt(localStorage.getItem('total_certs') || '0', 10);
        localStorage.setItem('total_certs', totalCerts + 1);
    }
    document.getElementById("quiz").innerHTML = `
        <div class="result-box">
            <h2>🎯 النتيجة النهائية</h2>

            <p style="font-size:18px;margin:15px 0;"><b>النتيجة:</b> ${score} / ${total}</p>
            <p style="font-size:18px;margin:15px 0;"><b>النسبة:</b> ${percent}%</p>
            <p style="font-size:18px;margin:15px 0;"><b>التقييم:</b> ${level}</p>

            <hr style="margin:20px 0;border:none;border-top:1px solid #e5e7eb;">

            <h3>📋 تحليل الأخطاء</h3>

            ${wrongAnswersHTML || "<p style='color:green;font-weight:bold;'>🎉 لا توجد أخطاء — أحسنت!</p>"}

            <hr style="margin:20px 0;border:none;border-top:1px solid #e5e7eb;">

            ${
                showCertificate
                ? `<button onclick="printCertificate(${percent})" style="margin:10px;">
                        🎓 طباعة الشهادة
                   </button>`
                : `<p style="color:#b91c1c;font-weight:bold;padding:15px;background:#fef2f2;border-radius:8px;">
                        📝 لا تتوفر شهادة إلا عند حل ${MIN_CERT_QUESTIONS} سؤالًا فأكثر بنسبة نجاح 60%
                   </p>`
            }

            <button onclick="location.reload()" style="margin:10px;background:#374151;">🔄 إعادة الاختبار</button>
            <br>
            <a href="index.html" style="display:inline-block;margin:10px;padding:12px 28px;background:#16a34a;color:#fff;border-radius:50px;text-decoration:none;font-weight:bold;">🏠 العودة للرئيسية</a>
        </div>
    `;
}

/* =========================
   PRINT CERTIFICATE
========================= */
function printCertificate(percent){

    const certId = "FIQH-" + Date.now();

    // Create certificate inline instead of redirecting
    const certHTML = `
        <div id="cert-print" style="padding:40px;border:8px double #166534;border-radius:18px;background:linear-gradient(135deg,#ecfdf5,#ffffff);text-align:center;max-width:700px;margin:0 auto;">
            <h1 style="color:#166534;font-size:28px;margin-bottom:20px;">🎓 شهادة إتمام الاختبار</h1>
            <p style="font-size:18px;margin:15px 0;"><b>اسم المتدرب:</b> ${esc(candidateName)}</p>
            <p style="font-size:18px;margin:15px 0;"><b>النتيجة:</b> ${score} / ${questions.length}</p>
            <p style="font-size:18px;margin:15px 0;"><b>النسبة:</b> ${percent}%</p>
            <p style="font-size:18px;margin:15px 0;"><b>رقم الشهادة:</b> ${certId}</p>
            <p style="font-size:14px;color:#666;margin-top:30px;">تم إصدار هذه الشهادة إلكترونياً من منصة التدريب الفقهي</p>
            <p style="font-size:14px;color:#666;">تاريخ الإصدار: ${new Date().toLocaleDateString('ar-SA')}</p>
        </div>
    `;

    document.getElementById("quiz").innerHTML = certHTML + `
        <div style="text-align:center;margin-top:20px;">
            <button onclick="window.print()" style="margin:10px;">🖨️ طباعة</button>
            <button onclick="location.reload()" style="margin:10px;background:#374151;">🔄 اختبار جديد</button>
        </div>
    `;
}
/* =========================
   UTILS
========================= */
function esc(t){
    const div = document.createElement('div');
    div.textContent = t;
    return div.innerHTML;
}
</script>

</body>
</html>
