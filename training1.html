<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة التدريب الفقهي</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#d1fae5;
    font-family:Tahoma, Arial, sans-serif;
    text-align:center;
    padding:20px;
    margin:0;
    min-height:100vh;
}

.main-card{
    max-width:780px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    border-top:6px solid #16a34a;
}

h1{color:#065f46;}

input,select,button{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #d1d5db;
    font-size:17px;
    font-family:inherit;
    box-sizing:border-box;
}

button{
    background:#16a34a;
    color:#fff;
    border:none;
    cursor:pointer;
    font-weight:bold;
    font-size:18px;
    padding:16px;
}

button:hover{background:#15803d;}

button:disabled{
    background:#9ca3af;
    cursor:not-allowed;
}

/* ====== حقل المصدر المميز ====== */
.source-box {
    background: #ecfdf5;
    border: 2px solid #16a34a;
    border-radius: 12px;
    padding: 15px;
    margin: 12px 0;
    text-align:right;
    position:relative;
}
.source-box label {
    display: block;
    color: #065f46;
    font-weight: bold;
    font-size: 17px;
    margin-bottom: 6px;
    text-align:right;
}
.source-box input {
    margin: 0;
    border: 2px solid #16a34a;
    background: #fff;
    font-weight: bold;
    color: #065f46;
    font-size:16px;
}
.source-box small {
    display:block;
    margin-top:6px;
    color:#166534;
    font-size:13px;
}

/* قائمة المصادر المنسدلة */
.src-dropdown{
    position:absolute;
    top:100%;
    right:15px;
    left:15px;
    background:#fff;
    border:2px solid #16a34a;
    border-radius:10px;
    max-height:250px;
    overflow-y:auto;
    z-index:100;
    display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.18);
    margin-top:4px;
    text-align:right;
}
.src-dropdown.on{display:block}
.src-item{
    padding:12px 16px;
    font-size:16px;
    cursor:pointer;
    border-bottom:1px solid #e5e7eb;
    color:#065f46;
    font-weight:600;
    transition:background .15s;
}
.src-item:hover{background:#dcfce7}
.src-item.sel{background:#16a34a;color:#fff}
.src-item .count{
    float:left;
    background:rgba(22,163,74,.15);
    color:#065f46;
    padding:2px 10px;
    border-radius:12px;
    font-size:12px;
    font-weight:700;
}
.src-item.sel .count{background:rgba(255,255,255,.3);color:#fff}

.src-selected{
    margin-top:10px;
    padding:10px 14px;
    background:#dcfce7;
    border-radius:10px;
    border:1px solid #16a34a;
    display:none;
}
.src-selected.on{display:block}
.src-selected span{
    color:#065f46;
    font-weight:bold;
    font-size:15px;
}
.src-clear{
    background:#dc2626;
    color:#fff;
    border:none;
    padding:4px 12px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    margin-right:8px;
}

/* =================================== */

/* ====== شاشة الاختبار ====== */
#quiz{
    max-width:900px;
    margin:0 auto;
}

.question{
    font-size:clamp(22px, 3vw, 32px);
    font-weight:800;
    color:#111827;
    margin:24px 0;
    line-height:1.8;
    text-align:right;
    padding:20px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.08);
}

.answer{
    background:#f3f4f6;
    padding:20px 24px;
    margin:10px 0;
    border-radius:14px;
    cursor:pointer;
    border:2px solid #d1d5db;
    font-weight:700;
    color:#000;
    transition:all .2s;
    font-size:clamp(18px, 2.5vw, 24px);
    text-align:right;
    line-height:1.6;
}

.answer:hover{
    background:#dcfce7;
    border-color:#16a34a;
    transform:translateY(-2px);
    box-shadow:0 4px 12px rgba(22,163,74,.2);
}

.meta{
    font-size:clamp(15px, 2vw, 18px);
    color:#166534;
    font-weight:700;
    margin-bottom:12px;
    text-align:right;
    padding:10px 16px;
    background:#ecfdf5;
    border-radius:10px;
    display:inline-block;
}

.error-msg{
    color:#dc2626;
    font-weight:bold;
    padding:20px;
    font-size:18px;
}

.success-msg{
    color:#16a34a;
    font-weight:bold;
    padding:20px;
    font-size:18px;
}

.result-box{
    background:#fff;
    padding:30px;
    border-radius:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.12);
    margin-top:20px;
    max-width:800px;
    margin-left:auto;
    margin-right:auto;
}

.wrong-item{
    border:1px solid #ddd;
    padding:14px;
    margin:12px 0;
    border-radius:10px;
    text-align:right;
    background:#fafafa;
}

.wrong-ans{color:#b91c1c;font-weight:bold;font-size:16px;}
.correct-ans{color:#15803d;font-weight:bold;font-size:16px;}

/* ====== الشهادة (بسيطة — للتوافق) ====== */
#certificate{
    display:none;
    margin-top:20px;
    padding:40px;
    border:8px double #166534;
    border-radius:18px;
    background:linear-gradient(135deg,#ecfdf5,#ffffff);
    max-width:800px;
    margin-left:auto;
    margin-right:auto;
}
#certificate h2{
    color:#166534;
    font-size:32px;
    margin-bottom:20px;
}
#certificate p{
    font-size:20px;
    margin:12px 0;
    color:#374151;
}
#certificate span{
    font-weight:bold;
    color:#065f46;
}

/* ====== Toast ====== */
.toast-wrap{
    position:fixed;
    top:12px;
    left:12px;
    z-index:2000;
    display:flex;
    flex-direction:column;
    gap:5px;
}
.toast{
    padding:12px 18px;
    border-radius:10px;
    color:#fff;
    font-size:15px;
    font-weight:600;
    box-shadow:0 4px 16px rgba(0,0,0,.2);
    animation:tIn .3s ease;
}
@keyframes tIn{
    from{opacity:0;transform:translateX(-20px)}
    to{opacity:1;transform:translateX(0)}
}
.toast.ok{background:#16a34a}
.toast.err{background:#dc2626}
.toast.inf{background:#065f46}

/* ====== Responsive ====== */
@media(max-width:768px){
    body{padding:10px}
    .main-card{padding:16px}
    .question{font-size:20px;padding:14px}
    .answer{font-size:17px;padding:14px 16px}
    #certificate{padding:20px}
    #certificate h2{font-size:24px}
    #certificate p{font-size:16px}
}
</style>
<base target="_blank">
</head>

<body>

<div style="display:flex;justify-content:space-between;align-items:center;max-width:780px;margin:0 auto 20px;flex-wrap:wrap;gap:10px">
  <a href="index.html" style="background:#16a34a;color:#fff;padding:10px 18px;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;">🏠 العودة للرئيسية</a>
  <h1 style="margin:0;font-size:clamp(20px,4vw,28px)">منصة التدريب الفقهي</h1>
  <span></span>
</div>

<div class="main-card" id="setupPanel">

<input id="candidateName" placeholder="✍️ اسم المتدرب" style="font-size:18px">

<select id="categoryFilter" style="font-size:16px">
    <option value="all">📂 كل التصنيفات</option>
    <option value="فقه">📗 فقه</option>
    <option value="عقيدة">📘 عقيدة</option>
    <option value="توحيد">📙 توحيد</option>
    <option value="تفسير">📕 تفسير</option>
    <option value="حديث">📓 حديث</option>
    <option value="أصول فقه">📔 أصول فقه</option>
    <option value="لغة عربية">📖 لغة عربية</option>
    <option value="سيرة">📜 سيرة</option>
    <option value="منوعات إسلامية">🕌 منوعات إسلامية</option>
    <option value="ثقافة إسلامية">🌙 ثقافة إسلامية</option>
    <option value="عام">📋 عام</option>
</select>

<select id="levelFilter" style="font-size:16px">
    <option value="all">📊 كل المستويات</option>
    <option value="سهل">🟢 سهل</option>
    <option value="متوسط">🟡 متوسط</option>
    <option value="صعب">🔴 صعب</option>
</select>

<!-- ====== حقل المصدر - بحث ذكي ====== -->
<div class="source-box">
    <label for="sourceSearch">📚 ابحث عن المصدر (الكتاب / المنهج)</label>
    <input id="sourceSearch" placeholder="🔍 اكتب اسم المصدر..." autocomplete="off" oninput="onSrcInput(this.value)" onfocus="onSrcFocus()">

    <div class="src-dropdown" id="srcDropdown"></div>

    <div class="src-selected" id="srcSelectedBox">
        <span>✅ المصدر المختار: <span id="srcSelectedName"></span></span>
        <button class="src-clear" onclick="clearSrc()">❌ إلغاء</button>
    </div>

    <small id="srcHint">⏳ جاري تحميل المصادر...</small>
</div>
<!-- =================================== -->

<select id="questionCount" style="font-size:16px">
    <option value="3" selected>3 أسئلة</option>
    <option value="5">5 أسئلة</option>
    <option value="10">10 أسئلة</option>
    <option value="20">20 سؤال</option>
    <option value="30">30 سؤال</option>
    <option value="50">50 سؤال</option>
    <option value="100">100 سؤال</option>
</select>

</div>

<button onclick="startExam()" id="startBtn" style="max-width:780px;margin:0 auto 20px;display:block">🚀 ابدأ الاختبار</button>

<div id="quiz"></div>

<!-- ====== الشهادة (للتوافق) ====== -->
<div id="certificate">
    <h2>🎓 شهادة إتمام الاختبار</h2>
    <p>اسم المتدرب: <span id="certName"></span></p>
    <p>النتيجة: <span id="score"></span> / <span id="total"></span></p>
    <p>نسبة النجاح: <span id="percent"></span>%</p>
    <p>رقم الشهادة: <span id="certId"></span></p>
    <div id="qr" style="margin:20px auto;width:120px;height:120px;background:#fff;border:2px solid #166534;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#166534">QR</div>
    <p style="font-size:16px;color:#666;margin-top:20px">ختم واعتماد المدير التنفيذي للمنصة</p>
    <p style="font-size:14px;color:#999" id="certDate"></p>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
"use strict";

/* =========================
   STATE
========================= */
let allQuestions = [];
let questions = [];
let current = 0;
let score = 0;
let candidateName = "";
let selectedCount = 3;
let answered = false;
let userAnswers = [];
let selSrc = "";
let srcListData = [];
let dataLoaded = false;

const MIN_CERT_QUESTIONS = 20;
const JSON_URL = "https://raw.githubusercontent.com/ieashehata1965-netizen/fiqh-tafaqh/main/fiqh-questions.json";

/* =========================
   INIT - تحميل فوري
========================= */
(function(){
    const savedName = localStorage.getItem('trainee_name');
    if(savedName){
        document.getElementById("candidateName").value = savedName;
    }
    loadQuestionsSilent();
})();

/* =========================
   LOAD QUESTIONS - صامت
========================= */
async function loadQuestionsSilent() {
    try {
        document.getElementById('srcHint').textContent = '⏳ جاري تحميل المصادر...';
        const res = await fetch(JSON_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const raw = await res.json();
        if (!Array.isArray(raw)) throw new Error("Not array");

        allQuestions = raw.map(normalize).filter(Boolean);

        const seen = new Set();
        allQuestions = allQuestions.filter(q => {
            const k = (q.q + "").toLowerCase().trim();
            if (seen.has(k)) return false;
            seen.add(k);
            return true;
        });

        dataLoaded = true;
        buildSrcList();
        document.getElementById('srcHint').textContent = '✅ تم تحميل ' + srcListData.length + ' مصدر — اكتب للبحث أو انقر للاختيار';
        toast('✅ تم تحميل ' + allQuestions.length + ' سؤال و ' + srcListData.length + ' مصدر', 'ok');

    } catch (e) {
        console.error(e);
        document.getElementById('srcHint').textContent = '❌ فشل التحميل — اضغط هنا لإعادة المحاولة';
        document.getElementById('srcHint').style.cursor = 'pointer';
        document.getElementById('srcHint').onclick = function(){ loadQuestionsSilent(); };
        toast('❌ فشل تحميل الأسئلة: ' + e.message, 'err');
    }
}

/* =========================
   BUILD SOURCE LIST
========================= */
function buildSrcList(){
    const counts = {};
    allQuestions.forEach(q => {
        const s = q.source || 'غير محدد';
        counts[s] = (counts[s] || 0) + 1;
    });

    srcListData = Object.keys(counts).sort((a, b) => {
        if(a === 'غير محدد') return 1;
        if(b === 'غير محدد') return -1;
        return counts[b] - counts[a];
    });

    window._srcCounts = counts;
}

/* =========================
   SOURCE DROPDOWN
========================= */
function onSrcFocus(){
    showSrcDropdown(srcListData);
}

function onSrcInput(txt){
    selSrc = '';
    document.getElementById('srcSelectedBox').classList.remove('on');

    if(!txt.trim()){
        showSrcDropdown(srcListData);
        return;
    }

    const lower = txt.toLowerCase();
    const filtered = srcListData.filter(s => s.toLowerCase().includes(lower));
    showSrcDropdown(filtered);
}

function showSrcDropdown(list){
    const dd = document.getElementById('srcDropdown');
    if(!list || !list.length){
        dd.innerHTML = '<div class="src-item" style="color:#999;padding:16px;text-align:center">لا توجد مصادر مطابقة</div>';
        dd.classList.add('on');
        return;
    }

    const counts = window._srcCounts || {};
    dd.innerHTML = list.map(s => {
        const isSel = selSrc === s;
        const count = counts[s] || 0;
        return '<div class="src-item ' + (isSel ? 'sel' : '') + '" onclick="selectSrc(' + escJS(s) + ')">' +
               esc(s) + 
               '<span class="count">' + count + ' سؤال</span>' +
               '</div>';
    }).join('');

    dd.classList.add('on');
}

function selectSrc(src){
    selSrc = src;
    document.getElementById('sourceSearch').value = src;
    document.getElementById('srcDropdown').classList.remove('on');
    document.getElementById('srcSelectedBox').classList.add('on');
    document.getElementById('srcSelectedName').textContent = src;

    const counts = window._srcCounts || {};
    const count = counts[src] || 0;
    document.getElementById('srcHint').textContent = '✅ ' + count + ' سؤال متاح من هذا المصدر';
}

function clearSrc(){
    selSrc = '';
    document.getElementById('sourceSearch').value = '';
    document.getElementById('srcSelectedBox').classList.remove('on');
    document.getElementById('srcDropdown').classList.remove('on');
    document.getElementById('srcHint').textContent = '✅ تم تحميل ' + srcListData.length + ' مصدر — اكتب للبحث أو انقر للاختيار';
}

document.addEventListener('click', function(e){
    if(!e.target.closest('.source-box')){
        document.getElementById('srcDropdown').classList.remove('on');
    }
});

/* =========================
   NORMALIZE
========================= */
function normalize(item){
    if(!item) return null;
    const q = String(item.q ?? "").trim();
    const a = Array.isArray(item.a) ? item.a : [];
    const c = Number(item.c);
    if(!q || a.length < 2) return null;
    return {
        id: item.id,
        category: item.category || "غير مصنف",
        level: item.level || "غير محدد",
        source: item.source || "غير محدد",
        q,
        a,
        c: (c >= 0 && c < a.length) ? c : 0
    };
}

/* =========================
   SHUFFLE
========================= */
function shuffle(arr){
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

/* =========================
   START EXAM
========================= */
window.startExam = async function () {
    candidateName = document.getElementById("candidateName").value.trim();
    if(!candidateName){
        toast("⚠️ أدخل اسمك أولاً", "err");
        document.getElementById("candidateName").focus();
        return;
    }

    selectedCount = parseInt(document.getElementById("questionCount").value, 10) || 3;

    const btn = document.getElementById("startBtn");
    btn.disabled = true;
    btn.textContent = "⏳ جاري التحضير...";

    if(!dataLoaded){
        toast("⏳ جاري تحميل الأسئلة...", "inf");
        await loadQuestionsSilent();
    }

    if(!dataLoaded || allQuestions.length === 0){
        toast("❌ لا توجد أسئلة متاحة", "err");
        btn.disabled = false;
        btn.textContent = "🚀 ابدأ الاختبار";
        return;
    }

    const cat = document.getElementById("categoryFilter").value;
    const lvl = document.getElementById("levelFilter").value;

    let pool = allQuestions.filter(q =>
        (cat === "all" || q.category === cat) &&
        (lvl === "all" || q.level === lvl) &&
        (selSrc === "" || q.source === selSrc)
    );

    if(pool.length === 0){
        toast("❌ لا توجد أسئلة تطابق الفلاتر المحددة", "err");
        btn.disabled = false;
        btn.textContent = "🚀 ابدأ الاختبار";
        return;
    }

    selectedCount = Math.min(selectedCount, pool.length);
    questions = shuffle(pool).slice(0, selectedCount);

    current = 0;
    score = 0;
    userAnswers = new Array(selectedCount).fill(null);

    btn.style.display = "none";
    document.getElementById('setupPanel').style.display = 'none';
    document.getElementById("certificate").style.display = "none";

    showQuestion();
};

/* =========================
   SHOW QUESTION
========================= */
function showQuestion(){
    answered = false;
    if(current >= questions.length){
        showResult();
        return;
    }
    const q = questions[current];
    let html = "<div style='max-width:900px;margin:0 auto;padding:10px'>";
    html += "<div class='meta'>📌 سؤال " + (current + 1) + " من " + questions.length + " &nbsp;|&nbsp; " + esc(q.category) + " &nbsp;|&nbsp; " + esc(q.level) + "</div>";
    html += "<div style='text-align:right;margin-bottom:12px'><span style='background:#f3e5f5;color:#6a1b9a;padding:8px 16px;border-radius:20px;font-size:15px;font-weight:700'>📖 " + esc(q.source || 'غير محدد') + "</span></div>";
    html += "<div class='question'>" + esc(q.q) + "</div>";
    const labels = ['أ','ب','ج','د'];
    q.a.forEach((ans, i) => {
        html += "<div class='answer' onclick='answer(" + i + ")' id='ans" + i + "'><span style='color:#16a34a;margin-left:12px;font-size:22px'>" + labels[i] + "-</span> " + esc(ans) + "</div>";
    });
    html += "</div>";
    document.getElementById("quiz").innerHTML = html;
    window.scrollTo(0,0);
}

/* =========================
   ANSWER
========================= */
function answer(i){
    if(answered) return;
    answered = true;
    const q = questions[current];
    userAnswers[current] = i;
    const boxes = document.querySelectorAll(".answer");
    if(i === q.c){
        score++;
        if(boxes[i]){
            boxes[i].style.background = "#dcfce7";
            boxes[i].style.borderColor = "#16a34a";
            boxes[i].innerHTML += " ✅";
        }
    } else {
        if(boxes[i]){
            boxes[i].style.background = "#fee2e2";
            boxes[i].style.borderColor = "#dc2626";
            boxes[i].innerHTML += " ❌";
        }
        if(boxes[q.c]){
            boxes[q.c].style.background = "#dcfce7";
            boxes[q.c].style.borderColor = "#16a34a";
            boxes[q.c].innerHTML += " ✅";
        }
    }
    setTimeout(() => {
        current++;
        showQuestion();
    }, 1200);
}

/* =========================
   RESULT
========================= */
function showResult(){
    const total = questions.length;
    const percent = total ? Math.round((score / total) * 100) : 0;

    const level =
        percent >= 90 ? "🌟 ممتاز" :
        percent >= 75 ? "👍 جيد جداً" :
        percent >= 60 ? "✅ جيد" :
        "📚 يحتاج تطوير";

    const showCertificate = selectedCount >= MIN_CERT_QUESTIONS && percent >= 60;

    let wrongAnswersHTML = "";
    questions.forEach((q, index) => {
        const userAnswer = userAnswers[index];
        const correct = q.c;
        const options = q.a;
        if(userAnswer !== correct){
            wrongAnswersHTML += `
                <div class="wrong-item">
                    <p style="font-size:17px;margin-bottom:8px"><b>❓ السؤال:</b> ${esc(q.q)}</p>
                    <p style="font-size:14px;color:#666;margin-bottom:4px">📖 المصدر: ${esc(q.source || 'غير محدد')} | ${esc(q.category)} | ${esc(q.level)}</p>
                    <p class="wrong-ans">❌ إجابتك: ${esc(options[userAnswer] ?? "لم تتم الإجابة")}</p>
                    <p class="correct-ans">✅ الإجابة الصحيحة: ${esc(options[correct] ?? "غير متوفرة")}</p>
                </div>
            `;
        }
    });

    let totalExams = parseInt(localStorage.getItem('total_exams') || '0', 10);
    localStorage.setItem('total_exams', totalExams + 1);

    let certHtml = '';
    if(showCertificate){
        let totalCerts = parseInt(localStorage.getItem('total_certs') || '0', 10);
        localStorage.setItem('total_certs', totalCerts + 1);

        certHtml = `
            <div style="background:linear-gradient(135deg,#ecfdf5,#dcfce7);border:3px solid #16a34a;border-radius:16px;padding:24px;margin:20px 0;text-align:center">
                <div style="font-size:48px;margin-bottom:10px">🎓</div>
                <h3 style="color:#065f46;font-size:22px;margin-bottom:8px">تهانينا! لقد حصلت على شهادة إتمام</h3>
                <p style="color:#166534;font-size:16px">لأنك أجبت على ${total} سؤال بنسبة نجاح ${percent}%</p>
                <button onclick="printCertificate()" style="margin-top:16px;padding:14px 32px;font-size:18px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:bold;box-shadow:0 4px 16px rgba(22,163,74,.3)">
                    🖨️ فتح وطباعة الشهادة
                </button>
            </div>
        `;
    } else {
        certHtml = `
            <div style="background:#fef2f2;border:2px solid #fecaca;border-radius:12px;padding:18px;margin:16px 0;color:#b91c1c;font-weight:bold;font-size:16px">
                📝 لا تتوفر شهادة إلا عند حل ${MIN_CERT_QUESTIONS} سؤالًا فأكثر بنسبة نجاح 60%
            </div>
        `;
    }

    document.getElementById("quiz").innerHTML = `
        <div class="result-box">
            <h2 style="color:#065f46;font-size:28px;margin-bottom:16px">🎯 النتيجة النهائية</h2>

            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:20px 0">
                <div style="background:#f0fdf4;padding:16px;border-radius:12px">
                    <div style="font-size:32px;font-weight:800;color:#16a34a">${score}</div>
                    <div style="font-size:14px;color:#666">صحيحة</div>
                </div>
                <div style="background:#fef2f2;padding:16px;border-radius:12px">
                    <div style="font-size:32px;font-weight:800;color:#dc2626">${total - score}</div>
                    <div style="font-size:14px;color:#666">خاطئة</div>
                </div>
                <div style="background:#eff6ff;padding:16px;border-radius:12px">
                    <div style="font-size:32px;font-weight:800;color:#2563eb">${percent}%</div>
                    <div style="font-size:14px;color:#666">النسبة</div>
                </div>
                <div style="background:#fffbeb;padding:16px;border-radius:12px">
                    <div style="font-size:24px;font-weight:800;color:#d97706">${level}</div>
                    <div style="font-size:14px;color:#666">التقييم</div>
                </div>
            </div>

            ${certHtml}

            <hr style="margin:24px 0;border:none;border-top:2px solid #e5e7eb">

            <h3 style="color:#065f46;font-size:20px;margin-bottom:16px">📋 تحليل الأخطاء</h3>
            ${wrongAnswersHTML || "<p style='color:#16a34a;font-weight:bold;font-size:18px;padding:20px'>🎉 لا توجد أخطاء — أحسنت!</p>"}

            <hr style="margin:24px 0;border:none;border-top:2px solid #e5e7eb">

            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:20px">
                <button onclick="location.reload()" style="padding:14px 28px;font-size:17px;background:linear-gradient(135deg,#374151,#1f2937);color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:bold">🔄 إعادة الاختبار</button>
                <a href="index.html" style="display:inline-block;padding:14px 28px;font-size:17px;background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border-radius:12px;text-decoration:none;font-weight:bold">🏠 العودة للرئيسية</a>
            </div>
        </div>
    `;
    window.scrollTo(0,0);
}

/* =========================
   PRINT CERTIFICATE - يفتح شهادتك الجاهزة
========================= */
function printCertificate(){
    const certId = "FIQH-" + Date.now();
    const percent = Math.round((score / questions.length) * 100);

    // بناء رابط الشهادة مع البيانات
    const certUrl = 'certificate.html' +
        '?name=' + encodeURIComponent(candidateName) +
        '&score=' + score +
        '&total=' + questions.length +
        '&id=' + certId;

    // فتح الشهادة في تبويب جديد
    window.open(certUrl, '_blank');
}

/* =========================
   UTILS
========================= */
function esc(t){
    const div = document.createElement('div');
    div.textContent = t;
    return div.innerHTML;
}

function escJS(s){
    return "'" + s.replace(/'/g, "\\'") + "'";
}

function toast(msg, tp){
    const c = document.getElementById('toastWrap');
    const d = document.createElement('div');
    d.className = 'toast ' + tp;
    d.textContent = msg;
    c.appendChild(d);
    setTimeout(() => d.remove(), 3500);
}
</script>
