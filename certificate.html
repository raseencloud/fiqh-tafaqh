<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>شهادة ذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>

body{
    margin:0;
    font-family:"Cairo","Montserrat",sans-serif;
    transition: background 0.8s ease;
}

/* الصفحة */
.page{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:auto;
    padding:20px;
}

/* الشهادة */
.certificate{
    width:800px;
    background:white;
    padding:30px;
    text-align:center;

    border:8px solid #C8A951;
    box-shadow:0 0 0 6px #166534, 0 20px 50px rgba(0,0,0,0.25);

    position:relative;
    overflow:hidden;
}

/* watermark */
.certificate::before{
    content:"";
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:url("logo.svg") no-repeat center;
    background-size:320px;
    opacity:0.05;
    width:100%;
    height:100%;
}

/* الهيدر */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.header-right{
    font-weight:800;
    color:#166534;
    font-size:18px;
}

.header-left{
    font-weight:600;
    color:#555;
    font-size:14px;
}

/* اللوجو */
.logo{
    width:110px;
    height:110px;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* العنوان الرئيسي */
.main-title{
    font-size:48px;
    font-weight:800;
    color:#166534;
    margin:30px 0 20px 0;
    letter-spacing:1px;
}

/* العنوان */
.title{
    font-size:34px;
    font-weight:800;
    color:#166534;
    margin-top:10px;
}

/* البيانات */
.block{
    margin:18px 0;
    font-size:20px;
}

.label{
    font-weight:700;
    color:#166534;
}

/* نتيجة ذكية */
.result-box{
    font-size:22px;
    font-weight:800;
    margin-top:10px;
}

/* رسالة ذكية */
.message{
    margin-top:15px;
    font-size:18px;
    color:#444;
}

/* footer */
.footer{
    margin-top:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
}

/* الجزء الأيمن من الفوتر */
.footer-right{
    flex:1;
    text-align:right;
    font-weight:800;
    font-size:18px;
    color:#166534;
}

/* الوسط QR */
.footer-center{
    flex:0 0 auto;
    display:flex;
    justify-content:center;
}

.qr{
    display:flex;
    justify-content:center;
}

/* الجزء الأيسر من الفوتر */
.footer-left{
    flex:1;
    text-align:left;
}

/* التوقيع */
.signature{
    text-align:center;
}

.signature-title{
    font-weight:800;
    font-size:16px;
    color:#166534;
    margin-bottom:5px;
}

.signature-name{
    font-weight:800;
    font-size:16px;
    color:#166534;
}

/* الختم */
.stamp{
    width:110px;
    height:110px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at 30% 30%, #fff8dc, #e6c875 40%, #c8a951);
    box-shadow:0 10px 20px rgba(0,0,0,0.25),
               inset 0 4px 10px rgba(255,255,255,0.6),
               inset 0 -6px 10px rgba(0,0,0,0.15);
    transform: rotate(-2deg);
    margin-right:20px;
}

.stamp-inner{
    width:115px;
    height:115px;
    border-radius:50%;
    border:2px dashed #166534;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    font-size:9px;
    font-weight:bold;
    color:#166534;
    background:rgba(255,255,255,0.7);
    padding:5px;
}

/* طباعة */
@media print{
    body{ background:white !important; }
    .certificate{ box-shadow:none; }
}

</style>
</head>

<body>

<div class="page">

<div class="certificate">

<div class="header">

    <div class="header-right">
        أكاديمية الفقه والتفقه الإسلامي
    </div>

    <div class="logo">

        <!-- شعار ذهبي -->
        <svg width="90" height="90" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="46" fill="url(#gold)" stroke="#166534"/>
            <path d="M25 55 Q50 35 75 55 L75 75 Q50 60 25 75 Z" fill="#166534"/>
            <line x1="50" y1="40" x2="50" y2="75" stroke="white" stroke-width="2"/>

            <defs>
                <radialGradient id="gold">
                    <stop offset="0%" stop-color="#fff8dc"/>
                    <stop offset="60%" stop-color="#e6c875"/>
                    <stop offset="100%" stop-color="#c8a951"/>
                </radialGradient>
            </defs>
        </svg>

    </div>

    <div class="header-left">
        Islamic Fiqh Academy
    </div>

</div>

<div class="main-title">أكاديمية الفقه والتفقه الإسلامي</div>

<div class="title">شهادة إتمام الاختبار</div>

<div class="block">
    <span class="label">اسم المتدرب:</span>
    <span id="name"></span>
</div>

<div class="block">
    <span class="label">النتيجة:</span>
    <span id="score"></span> / <span id="total"></span>
</div>

<div class="result-box" id="resultText"></div>

<div class="message" id="message"></div>

<div class="footer">

    <div class="footer-right">
        أكاديمية الفقه والتفقه الإسلامي
    </div>

    <div class="footer-center">
        <div class="qr" id="qr"></div>
    </div>

    <div class="footer-left">
        <div class="signature">
            <div class="signature-title">
                المدير التنفيذي
            </div>
            <div class="signature-name">
                إبراهيم السيد شحاته الشرقاوي
            </div>
        </div>
    </div>

</div>

<div style="display:flex;justify-content:flex-end;margin-top:30px;">
    <div class="stamp">
        <div class="stamp-inner">
            أكاديمية الفقه<br>
            والتفقه الإسلامي<br>
            ختم رسمي
        </div>
    </div>
</div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const name = params.get("name") || "";
const score = parseInt(params.get("score") || "0");
const total = parseInt(params.get("total") || "1");
const id = params.get("id") || "";

/* 👇 هنا مباشرة ضع الكود الجديد */
if (!name || !id) {
    document.body.innerHTML = `
        <div style="text-align:center;padding:50px;font-family:Cairo">
            <h2>لا يمكن عرض الشهادة</h2>
            <p>يجب فتحها من نظام الاختبار</p>
        </div>
    `;
    throw new Error("Missing certificate parameters");
}

const percent = Math.round((score / total) * 100);
    
/* عرض */
document.getElementById("name").innerText = name;

/* نتيجة ذكية */
let level = "";
let message = "";
let bg = "";

if (percent >= 90) {
    level = "ممتاز";
    message = "أداء رائع يدل على إتقان علمي متميز، نسأل الله لك المزيد من التوفيق.";
    bg = "linear-gradient(135deg,#fffdf7,#f7e7b1,#e6c875)";
}
else if (percent >= 75) {
    level = "جيد جداً";
    message = "أداء مميز، مع إمكانية الوصول إلى الإتقان الكامل بالمراجعة.";
    bg = "linear-gradient(135deg,#fffdf7,#fbf3d3,#f6e7b8)";
}
else if (percent >= 60) {
    level = "جيد";
    message = "أداء مقبول يحتاج إلى مزيد من التحسين والمراجعة.";
    bg = "linear-gradient(135deg,#f7f7f7,#e8e8e8,#dcdcdc)";
}
else {
    level = "يحتاج تطوير";
    message = "ننصح بإعادة المذاكرة والتركيز على الأساسيات.";
    bg = "linear-gradient(135deg,#ffecec,#ffd6d6,#f5bcbc)";
}

/* الخلفية الذكية */
document.body.style.background = bg;

/* عرض النصوص */
document.getElementById("resultText").innerText =
level + " (" + percent + "%)";

document.getElementById("message").innerText = message;

/* QR */
const verifyUrl =
"https://raseencloud.github.io/Shariah-Training/verify.html?id="
+ id;

new QRCode(document.getElementById("qr"), {
    text: verifyUrl,
    width: 140,
    height: 140
});
    
setTimeout(() => {
    window.print();
}, 800);
    
</script>

</body>
</html>
