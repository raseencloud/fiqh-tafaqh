<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أكاديمية الفقه والتفقه الإسلامي</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f8fafc;color:#1f2937;line-height:1.7}
a{text-decoration:none;color:inherit}

/* Navbar */
.nav{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,.05);z-index:1000;padding:0 20px}
.nav-in{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:65px}
.logo{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700;color:#1a5f3c}
.logo span{width:36px;height:36px;background:linear-gradient(135deg,#1a5f3c,#2ecc71);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.nav-links{display:flex;gap:6px;align-items:center}
.nav a{padding:8px 16px;border-radius:8px;font-size:14px;font-weight:500;transition:.3s}
.nav a:hover{background:rgba(26,95,60,.08);color:#1a5f3c}
.nav .btn{background:linear-gradient(135deg,#1a5f3c,#14532d);color:#fff!important;border-radius:50px!important}
.mob-btn{display:none;background:none;border:none;font-size:24px;cursor:pointer}

/* Hero */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:100px 20px 60px;background:linear-gradient(135deg,#f0fdf4,#d1fae5);text-align:center}
.hero-in{max-width:700px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(26,95,60,.1);color:#1a5f3c;padding:6px 16px;border-radius:50px;font-size:13px;font-weight:600;margin-bottom:20px}
.hero h1{font-size:clamp(28px,5vw,48px);font-weight:800;color:#14532d;line-height:1.3;margin-bottom:16px}
.hero h1 span{color:#2ecc71}
.hero p{color:#6b7280;font-size:17px;margin-bottom:28px}
.hero-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:13px 28px;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;display:inline-flex;align-items:center;gap:6px;transition:.3s}
.btn-p{background:linear-gradient(135deg,#1a5f3c,#14532d);color:#fff;box-shadow:0 4px 15px rgba(26,95,60,.3)}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(26,95,60,.4)}
.btn-s{background:#fff;color:#1a5f3c;border:2px solid #1a5f3c}
.btn-s:hover{background:#1a5f3c;color:#fff}

/* Stats */
.stats{background:#fff;padding:35px 20px}
.stats-in{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:20px;text-align:center}
.stats h3{font-size:28px;font-weight:800;color:#1a5f3c}
.stats p{font-size:13px;color:#6b7280}

/* Features */
.sec{padding:70px 20px;max-width:1200px;margin:0 auto}
.sec h2{text-align:center;font-size:28px;font-weight:800;color:#14532d;margin-bottom:10px}
.sec > p{text-align:center;color:#6b7280;margin-bottom:40px}
.feat{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:#fff;padding:28px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);text-align:center;transition:.3s;border:1px solid rgba(0,0,0,.04)}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(0,0,0,.12)}
.card .ic{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px}
.card h3{font-size:17px;margin-bottom:8px}
.card p{font-size:14px;color:#6b7280;margin-bottom:12px}
.card a{color:#1a5f3c;font-weight:600;font-size:14px}
.card a:hover{color:#14532d}

/* Vision */
.vis{background:linear-gradient(135deg,#14532d,#1a5f3c);color:#fff;padding:70px 20px;position:relative}
.vis::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E")}
.vis-in{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:24px;position:relative;z-index:1}
.vis-box{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);padding:24px;border-radius:16px;border:1px solid rgba(255,255,255,.2)}
.vis-box h3{font-size:18px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.vis-box p,.vis-box li{font-size:14px;opacity:.9;line-height:1.8}
.vis-box ul{padding-right:18px;margin-top:10px}
.vis-box li{margin-bottom:6px}

/* Share */
.share{text-align:center;padding:50px 20px;background:#fff}
.share h3{font-size:18px;margin-bottom:20px}
.share-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.share-btns a,.share-btns button{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;transition:.3s;border:none;cursor:pointer}
.share-btns a:hover,.share-btns button:hover{transform:translateY(-3px) scale(1.1)}
.s-wa{background:#25d366}.s-tg{background:#08c}.s-fb{background:#1877f2}.s-x{background:#000}.s-link{background:#1a5f3c}

/* Footer */
.foot{background:#1a1a2e;color:rgba(255,255,255,.7);padding:50px 20px 20px}
.foot-in{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:30px;margin-bottom:30px}
.foot h4{color:#fff;font-size:15px;margin-bottom:14px}
.foot a,.foot p{display:block;font-size:13px;margin-bottom:8px;transition:.3s}
.foot a:hover{color:#2ecc71}
.foot-bot{text-align:center;padding-top:20px;border-top:1px solid rgba(255,255,255,.1);font-size:12px;color:rgba(255,255,255,.4)}

/* Modal */
.mod{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:2000;display:none;align-items:center;justify-content:center;padding:20px}
.mod.on{display:flex}
.mod-box{background:#fff;padding:28px;border-radius:16px;max-width:400px;width:100%;text-align:center;position:relative}
.mod-box h3{font-size:18px;color:#14532d;margin-bottom:6px}
.mod-box p{color:#6b7280;font-size:14px;margin-bottom:20px}
.mod-box input{width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:12px;font-size:15px;font-family:inherit;margin-bottom:16px;text-align:center}
.mod-box input:focus{outline:none;border-color:#1a5f3c}
.mod-close{position:absolute;top:12px;left:12px;background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280}

/* Mobile */
@media(max-width:768px){
.nav-links{display:none;position:absolute;top:65px;left:0;right:0;background:#fff;padding:16px;flex-direction:column;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.nav-links.on{display:flex}
.mob-btn{display:block}
.hero{padding-top:80px}
.stats-in{grid-template-columns:repeat(2,1fr)}
}
</style>
<base target="_blank">
</head>
<body>

<nav class="nav" id="nav">
  <div class="nav-in">
    <a href="#" class="logo"><span>📖</span>أكاديمية الفقه والتفقه</a>
    <div class="nav-links" id="navLinks">
      <a href="#feat">المميزات</a>
      <a href="#vis">عن المنصة</a>
      <a href="#" class="btn" onclick="openMod();return false">🎯 ابدأ التدريب</a>
    </div>
    <button class="mob-btn" onclick="document.getElementById('navLinks').classList.toggle('on')">☰</button>
  </div>
</nav>

<section class="hero">
  <div class="hero-in">
    <div class="hero-badge"><span>🌟</span><span>منصة تعليمية شرعية غير ربحية</span></div>
    <h1>تعلم <span>الفقه</span> والتفقه<br>في الإسلام</h1>
    <p>منصة علمية شرعية تهدف إلى تعليم المسلمين، المراجعة المستمرة، والتعلم بالممارسة من خلال اختبارات تفاعلية مع الشرح</p>
    <div class="hero-btns">
      <a href="index.html" class="btn btn-p" id="startBtn">🎯 ابدأ التدريب الآن</a>
      <a href="#feat" class="btn btn-s">📚 استكشف المميزات</a>
    </div>
  </div>
</section>
