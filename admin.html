<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإدارة - أكاديمية الفقه</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f5f7fa;min-height:100vh;color:#1a1a2e}
a{text-decoration:none;color:inherit}

/* Sidebar */
.side{position:fixed;right:0;top:0;width:250px;height:100vh;background:linear-gradient(180deg,#1a1a2e,#16213e);color:#fff;padding:20px 15px;overflow-y:auto;z-index:1000}
.side h1{font-size:16px;text-align:center;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:15px}
.side h1 p{font-size:11px;opacity:.7;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:3px;cursor:pointer;transition:.2s;color:rgba(255,255,255,.85);font-size:14px}
.nav-item:hover,.nav-item.on{background:rgba(255,255,255,.1);color:#fff}
.nav-item .icon{font-size:16px;width:20px;text-align:center}
.nav-sec{font-size:10px;text-transform:uppercase;opacity:.5;margin:15px 0 8px;padding-right:12px}

/* Main */
.main{margin-right:250px;padding:20px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.top h2{font-size:20px}
.user{display:flex;align-items:center;gap:8px;background:#fff;padding:6px 14px;border-radius:50px;box-shadow:0 2px 10px rgba(0,0,0,.08);font-size:13px}
.user .role{background:#0f3460;color:#fff;padding:2px 8px;border-radius:10px;font-size:11px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
.stat{background:#fff;padding:18px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);display:flex;align-items:center;gap:14px}
.stat .ic{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat h3{font-size:22px;color:#1a1a2e}
.stat p{font-size:12px;color:#6c757d}

/* Cards */
.card{background:#fff;border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card h3{font-size:15px;color:#0f3460;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #dee2e6}

/* Actions */
.acts{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.act{display:flex;align-items:center;gap:10px;padding:14px;background:linear-gradient(135deg,#f8f9fa,#e9ecef);border:2px solid #dee2e6;border-radius:12px;transition:.2s}
.act:hover{border-color:#0f3460;background:#fff;transform:translateY(-2px)}
.act .ic{font-size:24px}
.act h4{font-size:13px;margin-bottom:2px}
.act p{font-size:11px;color:#6c757d}

/* Status */
.status{display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:13px}
.status .dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.status .dot.on{background:#2ecc71;box-shadow:0 0 6px #2ecc71}
.status .dot.off{background:#e74c3c}

/* Quality */
.qual{padding:12px;border-radius:8px;font-size:13px}
.qual.ok{background:#e8f5e9;color:#2e7d32;text-align:center}
.qual.err{background:#ffebee;color:#c62828;margin-bottom:10px}
.qual.warn{background:#fff3e0;color:#ef6c00;margin-bottom:10px}

/* Logs */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:right;padding:10px;background:#f8f9fa;color:#6c757d;font-size:11px;font-weight:600}
td{padding:10px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafbfc}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.b-add{background:#e8f5e9;color:#2e7d32}
.b-edit{background:#e3f2fd;color:#1565c0}
.b-del{background:#ffebee;color:#c62828}
.b-sync{background:#f3e5f5;color:#6a1b9a}
